name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck · Lint · Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: strayanimals
          POSTGRES_PASSWORD: strayanimals
          POSTGRES_DB: strayanimals
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U strayanimals"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://strayanimals:strayanimals@localhost:5432/strayanimals?schema=public
      JWT_ACCESS_SECRET: ci-access-secret-not-for-prod-just-for-tests-32b
      JWT_REFRESH_SECRET: ci-refresh-secret-not-for-prod-just-for-tests-32
      CI: true

    steps:
      - uses: actions/checkout@v5

      - name: Use Node ${{ matrix.node }}
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck (all workspaces)
        run: npm run typecheck

      - name: Build (all workspaces)
        run: npm run build
