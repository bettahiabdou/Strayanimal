# Render blueprint — provisions the backend service.
# Connect this repo on https://render.com → New → Blueprint and Render will
# create the service automatically. Set the env-vars marked `sync: false`
# manually in the Render dashboard (they're secrets).
#
# Database: we don't provision Postgres here — use Neon (free 3GB tier).
# Set DATABASE_URL in Render to the Neon connection string.

services:
  - type: web
    name: strayanimals-backend
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npm run build && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 30d
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: LOG_LEVEL
        value: info
