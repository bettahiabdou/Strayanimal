services:
  postgres:
    image: postgres:16-alpine
    container_name: strayanimals-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: strayanimals
      POSTGRES_PASSWORD: strayanimals
      POSTGRES_DB: strayanimals
    ports:
      # Host:Container — host 5433 to avoid clashing with system Postgres on 5432
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strayanimals -d strayanimals"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
